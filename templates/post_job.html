<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <title>Jobs</title>
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">Job Portal</a>
                <div>
                    <a href="javascript:history.back()" class="btn btn-secondary">← Back</a>
                    <a href="/logout" class="btn btn-danger">Logout</a>
                </div>
            </div>
        </nav>
        <div class="container mt-5 text-center">
            <div class="card p-4 shadow" style="max-width:500px; margin:auto;">
                <h1>Post Job</h1>
                <form action="/post-job" method="POST">
                    <label>Title</label>
                    <input type="text" name="title" placeholder="Enter Job Title" class="form-control" required>
                    <label>Description</label>
                    <textarea name="description" placeholder="Enter Job Description" class="form-control" required></textarea>
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="Enter Company Name" class="form-control" required>
                    <label>Experience</label>
                    <input type="text" name="experience" placeholder="Enter Experience Required" class="form-control" required>
                    <label>Location</label>
                    <input type="text" name="location" placeholder="Enter Job Location" class="form-control" required>
                    <label>Salary</label>
                    <input type="text" name="salary" placeholder="Enter Salary" class="form-control" required>
                    <label>Contact Info</label>
                    <input type="text" name="contact_info" placeholder="Enter Contact Info" class="form-control" required>
                    <button type="submit" class="btn btn-primary">Post Job</button>
                </form>
            </div>
        </div>
    </body>
</html>
