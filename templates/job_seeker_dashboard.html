<!-- Job Seeker Dashboard - Main page for job seekers with notification badges -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <title>Job Seeker Dashboard</title>
    </head>
    <body>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">Job Portal</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="card p-4 shadow">
                <h2>Welcome, {{ current_user.name }}!</h2>
                <p>Role: Job Seeker</p>
                <div class="mb-3">
                    <span class="badge bg-warning">⏳ Pending: {{ pending }}</span>
                    <span class="badge bg-success">✅ Accepted: {{ accepted }}</span>
                    <span class="badge bg-danger">❌ Rejected: {{ rejected }}</span>
                </div>
                <a href="/browse-job" class="btn btn-primary">Search Job</a>
                <a href="/my-applications" class="btn btn-secondary">View Applications</a>
            </div>
        </div>        
    </body>
</html>
