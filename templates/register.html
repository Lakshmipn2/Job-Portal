<!-- Register Page - New user registration form -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <title>Register - Job Portal</title>
    </head>
    <body> 
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">Job Portal</a>
                <div>
                    <a href="/login">Already have an account? Login here</a>
                </div>
            </div>
        </nav>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mt-2 container">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="container mt-5 text-center">
            <div class="card p-4 shadow" style="max-width:500px; margin:auto;">
                <h1>Create an Account</h1>
                <p class="lead">Already have an account?
                    <a href="/login">Login here</a>
                </p>
                <form action="/register" method="POST">
                    <label>Full name</label>
                    <input type="text" name="name" placeholder="Enter your name" class="form-control" required>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" class="form-control" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" class="form-control" required>
                    <label>Phone number</label>
                    <input type="text" name="phone_number" placeholder="Enter your phone number" class="form-control" required>
                    <label>Role</label>
                    <select name="role" class="form-control">
                        <option value="">Select role</option>
                        <option value="Job-Seeker">Job Seeker</option>
                        <option value="Employer">Employer</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>
    </body>
</html>
